name: E2E test

on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter ./apps/studio exec playwright install --with-deps chromium
      - name: Build web
        run: pnpm --filter ./apps/studio build
      - name: Run E2E
        run: pnpm --filter ./apps/studio e2e
