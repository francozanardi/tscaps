name: Publish @tscaps/engine to npm

on:
  push:
    tags: ['engine-v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run pack only, do not publish'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write

concurrency:
  group: engine-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    uses: ./.github/workflows/e2e.yml

  publish:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/engine-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#engine-v}"
          PKG_VERSION=$(node -p "require('./packages/engine/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match packages/engine/package.json version ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package version both $PKG_VERSION."

      - name: Typecheck
        run: pnpm --filter @tscaps/engine typecheck

      - name: Build
        run: pnpm --filter @tscaps/engine build

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        working-directory: packages/engine
        run: npm pack --dry-run

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        working-directory: packages/engine
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
